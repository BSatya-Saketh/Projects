*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#0a0a0a;--white:#ffffff;--gray:#555555;
  --gray2:#1e1e1e;--gray3:#888888;--border:#222222;
  --font-display:'Barlow Condensed',sans-serif;
  --font-mono:'Space Mono',monospace;
  --font-body:'Inter',sans-serif;
  --sidebar-w:60px;
}
body{background:var(--bg);color:var(--white);font-family:var(--font-body);overflow-x:hidden}
body.custom-cursor,body.custom-cursor *{cursor:none!important}
a{color:inherit;text-decoration:none}

/* CURSOR */
#cur-dot,#cur-ring{
  position:fixed;top:0;left:0;border-radius:50%;
  pointer-events:none;z-index:99999;
}
#cur-dot{width:6px;height:6px;background:var(--white)}
#cur-ring{
  width:32px;height:32px;
  border:1.5px solid rgba(255,255,255,.55);
  transition:width .18s,height .18s,border-color .18s;
}
#cur-ring.hov{width:48px;height:48px;border-color:var(--white)}
body:not(.custom-cursor) #cur-dot,
body:not(.custom-cursor) #cur-ring{display:none}

/* SIDEBAR */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:28px 0;z-index:200;border-right:1px solid var(--border);background:var(--bg);
}
.sidebar-logo{font-family:var(--font-display);font-weight:900;font-size:1.1rem;letter-spacing:.05em}
.sidebar-nav{display:flex;flex-direction:column;align-items:center;gap:32px}
.sidebar-nav a{
  font-family:var(--font-mono);font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gray3);writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);
  transition:color .2s;
}
.sidebar-nav a:hover,.sidebar-nav a.active{color:var(--white)}
.sidebar-btm{
  font-family:var(--font-mono);font-size:.5rem;letter-spacing:.2em;
  color:var(--gray);writing-mode:vertical-rl;transform:rotate(180deg);text-transform:uppercase;
}

/* MOBILE NAV */
.mob-nav{
  display:none;position:fixed;top:0;left:0;right:0;height:56px;
  background:var(--bg);border-bottom:1px solid var(--border);
  align-items:center;justify-content:space-between;padding:0 20px;z-index:300;
}
.mob-logo{font-family:var(--font-display);font-weight:900;font-size:1rem;letter-spacing:.05em}
.ham{
  background:none;border:none;color:var(--white);
  width:32px;height:32px;display:flex;flex-direction:column;
  justify-content:center;gap:5px;padding:4px;cursor:pointer;
}
.ham span{display:block;width:100%;height:1.5px;background:var(--white);transition:transform .3s,opacity .3s}
.ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0}
.ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mob-menu{
  display:none;position:fixed;top:56px;left:0;right:0;bottom:0;
  background:var(--bg);z-index:250;
  flex-direction:column;align-items:center;justify-content:center;gap:40px;
}
.mob-menu.open{display:flex}
.mob-menu a{
  font-family:var(--font-mono);font-size:.85rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--gray3);transition:color .2s;
}
.mob-menu a:hover,.mob-menu a.active{color:var(--white)}

/* LAYOUT */
.main{margin-left:var(--sidebar-w)}
.datebar{
  font-family:var(--font-mono);font-size:.65rem;letter-spacing:.3em;
  color:var(--gray3);padding:18px 60px;border-bottom:1px solid var(--border);
}

/* HERO */
#home{
  min-height:100vh;padding:80px 60px;
  display:flex;flex-direction:column;justify-content:center;
}
.hero-name{font-family:var(--font-display);font-weight:900;line-height:.88;text-transform:uppercase}
.hero-name .first{
  font-size:clamp(72px,11vw,160px);color:var(--white);display:block;
  animation:slideUp .8s cubic-bezier(.16,1,.3,1) both;
}
.hero-name .last{
  font-size:clamp(56px,9vw,130px);color:var(--gray);display:block;
  animation:slideUp .85s .1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.hero-meta{display:flex;gap:60px;margin-top:60px;flex-wrap:wrap;animation:fadeIn .8s .4s both}
.hero-meta-item label{
  font-family:var(--font-mono);font-size:.6rem;letter-spacing:.3em;
  color:var(--gray3);display:block;margin-bottom:8px;
}
.hero-meta-item span{font-family:var(--font-mono);font-size:.75rem;letter-spacing:.15em;color:var(--white)}
.hero-btns{display:flex;gap:16px;margin-top:50px;flex-wrap:wrap;animation:fadeIn .8s .6s both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.btn{
  font-family:var(--font-mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  padding:16px 28px;border:1px solid var(--white);background:transparent;color:var(--white);
  display:inline-block;transition:background .2s,color .2s;
}
.btn:hover{background:var(--white);color:var(--bg)}

/* SECTIONS */
section{padding:100px 60px;border-top:1px solid var(--border)}
.section-heading{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(48px,7vw,100px);line-height:.9;text-transform:uppercase;margin-bottom:60px;
}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-fade{opacity:0;transition:opacity .6s ease}
.reveal-fade.visible{opacity:1}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:80px}
.stat-item{border-right:1px solid var(--border);padding:0 40px 0 0;margin-right:40px}
.stat-item:last-child{border-right:none;margin-right:0}
.stat-item label{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.3em;color:var(--gray3);display:block;margin-bottom:10px}
.stat-item .num{font-family:var(--font-display);font-weight:900;font-size:clamp(40px,5vw,72px)}

/* ABOUT */

.about-col h2{

  font-size:clamp(30px,4vw,56px);text-transform:uppercase;line-height:.95;margin-bottom:50px;
}
.edu-entry,.exp-entry{margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.edu-entry:last-child,.exp-entry:last-child{border-bottom:none;margin-bottom:0}
.entry-school{font-family:var(--font-display);font-weight:700;font-size:1.2rem;margin-bottom:6px}
.entry-degree{font-size:.8rem;color:var(--gray3);margin-bottom:8px}

.bullet-list li::before{content:'—';position:absolute;left:0;color:var(--gray3)}

/* SKILLS */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:48px}
.skill-cat h3{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.3em;color:var(--gray3);text-transform:uppercase;margin-bottom:24px}
.skill-tags{display:flex;flex-wrap:wrap;gap:10px}

/* PROJECTS */

.project-name{font-family:var(--font-display);font-weight:700;font-size:clamp(20px,2.2vw,32px);line-height:1;text-transform:uppercase;margin-bottom:16px}
.project-desc{font-size:.78rem;line-height:1.7;color:var(--gray3);margin-bottom:24px}
.project-tech{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.15em;color:var(--gray3)}

/* CERTS */
.certs-grid{display:grid;grid-template-columns:repeat(2,1fr)}

.cert-org{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.2em;color:var(--gray3)}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px}
.contact-tagline{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(32px,4.5vw,64px);line-height:.9;text-transform:uppercase;margin-bottom:48px;

.contact-links{display:flex;flex-direction:column}
.contact-link{
  display:flex;align-items:center;gap:24px;padding:28px 0;

.contact-link:first-child{border-top:1px solid var(--border)}
.contact-link:hover{color:var(--gray3)}
.cl-label{font-size:.55rem;letter-spacing:.3em;color:var(--gray3);min-width:64px;text-transform:uppercase}
.contact-right{display:flex;flex-direction:column;justify-content:center;gap:24px}
.contact-box{
  border:1px solid var(--border);padding:32px 36px;
  transition:background .2s,color .2s;display:block;
}
.contact-box:hover{background:var(--white);color:var(--bg)}
.contact-box:hover .cb-label{color:rgba(0,0,0,.5)}
.cb-label{font-family:var(--font-mono);font-size:.55rem;letter-spacing:.3em;color:var(--gray3);text-transform:uppercase;margin-bottom:8px}
.cb-val{font-family:var(--font-mono);font-size:.78rem;letter-spacing:.08em}

/* FOOTER */
footer{
  border-top:1px solid var(--border);padding:32px 60px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
}
.ft-left{font-family:var(--font-display);font-weight:900;font-size:1.1rem}
.ft-mid{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.2em;color:var(--gray3);text-transform:uppercase}
.ft-right{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.2em;color:var(--gray3);text-align:right;text-transform:uppercase}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .mob-nav{display:flex}
  .main{margin-left:0;padding-top:56px}
  #home{padding:40px 24px 60px}
  .datebar{padding:14px 24px}
  section{padding:60px 24px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:32px}
  .stat-item{border-right:none;padding:0;margin-right:0}
  .about-grid{grid-template-columns:1fr;gap:48px}
  .skills-grid{grid-template-columns:1fr;gap:36px}
  .projects-grid{grid-template-columns:1fr}
  .project-card{margin:0;border:1px solid var(--border);margin-bottom:-1px}
  .certs-grid{grid-template-columns:1fr}
  .cert-item{margin:0;border:1px solid var(--border);margin-bottom:-1px}
  .contact-grid{grid-template-columns:1fr;gap:48px}
  footer{grid-template-columns:1fr;gap:16px;text-align:center;padding:32px 24px}
  .ft-right{text-align:center}
  .hero-meta{gap:28px}
}
@media(max-width:480px){
  .hero-btns{flex-direction:column}
  .btn{text-align:center}
}
</style>

// ── HOOKS ─────────────────────────────────────────────────────

function useCustomCursor() {
  useEffect(() => {
    const touch   = window.matchMedia("(pointer:coarse)").matches;
    const reduced = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
    if (touch || reduced) return;

    document.body.classList.add("custom-cursor");
    const dot  = document.getElementById("cur-dot");
    const ring = document.getElementById("cur-ring");
    if (!dot || !ring) return;

    let mx = -200, my = -200, rx = -200, ry = -200, raf;
    const lerp = (a, b, t) => a + (b - a) * t;

    const onMove = (e) => { mx = e.clientX; my = e.clientY; };
    const onOver = (e) => {
      const hit = e.target.closest("a,button,.btn,.project-card,.contact-box,.skill-tag,.cert-item");
      ring.classList.toggle("hov", !!hit);
    };
    const tick = () => {
      rx = lerp(rx, mx, 0.12);
      ry = lerp(ry, my, 0.12);
      dot.style.transform  = `translate(calc(${mx}px - 50%), calc(${my}px - 50%))`;
      ring.style.transform = `translate(calc(${rx}px - 50%), calc(${ry}px - 50%))`;
      raf = requestAnimationFrame(tick);
    };

    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseover", onOver);
    raf = requestAnimationFrame(tick);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseover", onOver);
      cancelAnimationFrame(raf);
      document.body.classList.remove("custom-cursor");
    };
  }, []);
}

function useActiveSection() {
  const [active, setActive] = useState("home");
  useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => entries.forEach(e => e.isIntersecting && setActive(e.target.id)),
      { rootMargin: "-40% 0px -55% 0px" }
    );
    NAV.forEach(({ id }) => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);
  return active;
}

function useLiveDate() {
  const [date, setDate] = useState("");
  useEffect(() => {
    const fmt = () => new Date().toLocaleDateString("en-US", {
      weekday:"long", year:"numeric", month:"long", day:"numeric"
    }).toUpperCase();
    setDate(fmt());
    const id = setInterval(() => setDate(fmt()), 60000);
    return () => clearInterval(id);
  }, []);
  return date;
}

function useScrollReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); }),
      { rootMargin: "0px 0px -80px 0px" }
    );
    document.querySelectorAll(".reveal,.reveal-fade").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}
